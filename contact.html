    <section class="contact-container animate-up">
        <div class="contact-info">
            <h2>Contactez-nous</h2>
            <p >Une question ? Une demande spécifique ?<br> Notre équipe est à votre écoute.</p>
            <br>
            <br>
            <div class="info-item">
                <span>Manouba , Tunisie</span>
            </div>
            <br>
            <br>
            <div class="info-item">
                <span>+216 77 152 145</span>
            </div>
            <br>
            <br>
            <div class="info-item">
                <span>fieldzone@gmail.com</span>
            </div>
        </div>
        

        <div class="contact-form-box">
            <form action="process_contact.php" method="POST">
                <div class="form-group">
                    <label>Nom Complet</label>
                    <input type="text" name="nom" placeholder="Ex: Ahmed Ben Salah" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="votre@email.com" required>
                </div>
                <div class="form-group">
                    <label>Sujet</label>
                    <select name="sujet">
                        <option value="Réservation de terrain">Réservation de terrain</option>
                        <option value="Problème boutique">Problème boutique</option>
                        <option value="Partenariat">Partenariat</option>
                        <option value="Autre">Autre</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea name="message" rows="5" placeholder="Votre message ici..." required></textarea>
                </div>
                <button type="submit" class="btn-reserver">Envoyer le message</button>
            </form>
        </div>
    </section>
</body>
</html>
